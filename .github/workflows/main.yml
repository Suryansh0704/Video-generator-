name: 🎬 Generate Video

on:
  workflow_dispatch:
    inputs:
      script_text:
        description: 'Script content'
        required: true
        type: string

jobs:
  generate-video:
    name: Run Video Generator
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-liberation

      - name: 📦 Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests

      - name: 📝 Write script.txt
        run: |
          cat << 'SCRIPT_EOF' > script.txt
          ${{ github.event.inputs.script_text }}
          SCRIPT_EOF
          echo "✅ script.txt written ($(wc -c < script.txt) bytes)"
          head -3 script.txt

      - name: ⬇️ Download latest audio artifact
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          python - <<'PYEOF'
          import requests, os, zipfile, shutil, glob

          token = os.environ["GH_TOKEN"]
          headers = {
            "Authorization": f"Bearer {token}",
            "Accept": "application/vnd.github+json"
          }

          # Get latest artifact from Audio-generator- repo
          res = requests.get(
            "https://api.github.com/repos/Suryansh0704/Audio-generator-/actions/artifacts",
            headers=headers
          )
          data = res.json()
          artifacts = data.get("artifacts", [])

          if not artifacts:
            print("ERROR: No artifacts found in Audio-generator-")
            exit(1)

          latest = artifacts[0]
          print(f"Found artifact: {latest['name']} ({latest['size_in_bytes']} bytes)")

          # Download the zip
          r = requests.get(latest["archive_download_url"], headers=headers)
          with open("audio.zip", "wb") as f:
            f.write(r.content)
          print("Downloaded audio.zip")

          # Extract
          with zipfile.ZipFile("audio.zip", "r") as z:
            z.extractall("audio_extracted")
          print("Extracted audio.zip")

          # Find WAV file
          wavs = glob.glob("audio_extracted/**/*.wav", recursive=True)
          if not wavs:
            wavs = glob.glob("audio_extracted/*.wav")

          if wavs:
            shutil.copy(wavs[0], "output_voice.wav")
            size = os.path.getsize("output_voice.wav")
            print(f"Audio ready: output_voice.wav ({size} bytes)")
          else:
            print("ERROR: No WAV file found in artifact")
            exit(1)
          PYEOF

      - name: ✅ Verify audio file
        run: |
          if [ ! -f "output_voice.wav" ]; then
            echo "❌ ERROR: output_voice.wav not found"
            exit 1
          fi
          SIZE=$(wc -c < output_voice.wav)
          echo "✅ output_voice.wav ready (${SIZE} bytes)"
          ffprobe -v quiet -show_format output_voice.wav 2>&1 | grep duration || true

      - name: 🎬 Generate video
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python generate_video.py

      - name: ✅ Verify output
        run: |
          if [ ! -f "raw_video.mp4" ]; then
            echo "❌ raw_video.mp4 not created"
            exit 1
          fi
          SIZE=$(wc -c < raw_video.mp4)
          echo "✅ raw_video.mp4 ready (${SIZE} bytes)"
          ffmpeg -i raw_video.mp4 2>&1 | grep -E "Duration|Video|Audio" || true

      - name: 📤 Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ github.sha }}
          path: raw_video.mp4
          retention-days: 30
          if-no-files-found: error

      - name: 📊 Write job summary
        if: success()
        run: |
          echo "## 🎬 Video Generated Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Output | raw_video.mp4 (no audio) |" >> $GITHUB_STEP_SUMMARY
          echo "| Format | 1080x1920 vertical (Shorts/Reels) |" >> $GITHUB_STEP_SUMMARY
          echo "| Audio | Stripped — merged by editor repo |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⬇️ Download from **Artifacts** above." >> $GITHUB_STEP_SUMMARY
