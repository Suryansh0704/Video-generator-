name: 🎬 Generate Video

on:
  push:
    paths:
      - "script.txt"
      - "optimization-config.json"
  workflow_dispatch:

jobs:
  generate-video:
    name: Run Kinetic Typography Engine
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            libsndfile1 \
            libgl1

      - name: 📦 Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            requests \
            opencv-python-headless \
            librosa \
            numpy \
            soundfile \
            Pillow \
            edge-tts

      - name: 📄 Verify script.txt
        run: |
          if [ ! -f "script.txt" ]; then
            echo "❌ script.txt not found"
            exit 1
          fi
          echo "✅ script.txt ($(wc -c < script.txt) bytes)"
          head -3 script.txt

      - name: 🧬 Load optimization config
        run: |
          python - <<'PYEOF'
          import json, os
          
          OPT = {
            "version": "default",
            "target_duration_seconds": 55,
            "hook_settings": {
              "duration_seconds": 3,
              "style": "statement",
              "templates": ["This is why...", "The truth about...", "Never..."]
            },
            "visual_settings": {
              "text_animation": "fade",
              "background": "dark_gradient",
              "caption_style": "bold_white",
              "cut_interval_seconds": 2.0,
              "zoom_on_impact": True,
              "zoom_intensity": 1.2
            },
            "title_optimization": {
              "preferred_words": ["secret", "truth", "why", "never", "dark"],
              "max_length": 80,
              "must_include_hook": True
            },
            "content_rules": {
              "pattern_interrupt_every_seconds": 8,
              "danger_zone_mitigation": ["zoom", "text_flash", "sound_effect"]
            },
            "thumbnail_text_overlay": {
              "enabled": True,
              "style": "bold_red",
              "max_words": 3
            }
          }
          
          try:
            with open('optimization-config.json', 'r') as f:
              loaded = json.load(f)
              OPT.update(loaded)
              print(f"✅ Using Gen {OPT['version']}")
          except Exception as e:
            print(f"⚠️ Using defaults: {e}")
          
          # Save as environment variables for later steps
          with open(os.environ.get('GITHUB_ENV', '/dev/null'), 'a') as env:
            env.write(f"OPT_VERSION={OPT['version']}\n")
            env.write(f"OPT_CUT_INTERVAL={OPT['visual_settings']['cut_interval_seconds']}\n")
            env.write(f"OPT_ZOOM_INTENSITY={OPT['visual_settings']['zoom_intensity']}\n")
            env.write(f"OPT_PATTERN_INTERRUPT={OPT['content_rules']['pattern_interrupt_every_seconds']}\n")
            env.write(f"OPT_TARGET_DURATION={OPT['target_duration_seconds']}\n")
          PYEOF

      - name: ⬇️ Download latest audio artifact
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          python - <<'PYEOF'
          import requests, os, zipfile, shutil, glob
          token = os.environ["GH_TOKEN"]
          headers = {
            "Authorization": f"Bearer {token}",
            "Accept": "application/vnd.github+json"
          }
          res = requests.get(
            "https://api.github.com/repos/Suryansh0704/Audio-generator-/actions/artifacts",
            headers=headers
          )
          artifacts = res.json().get("artifacts", [])
          if not artifacts:
            print("ERROR: No artifacts found")
            exit(1)
          latest = artifacts[0]
          print(f"Downloading: {latest['name']} ({latest['size_in_bytes']} bytes)")
          r = requests.get(latest["archive_download_url"], headers=headers)
          with open("audio.zip", "wb") as f:
            f.write(r.content)
          with zipfile.ZipFile("audio.zip", "r") as z:
            z.extractall("audio_extracted")
          wavs = glob.glob("audio_extracted/**/*.wav", recursive=True)
          if not wavs:
            wavs = glob.glob("audio_extracted/*.wav")
          if wavs:
            shutil.copy(wavs[0], "output_voice.wav")
            print(f"✅ output_voice.wav ({os.path.getsize('output_voice.wav')} bytes)")
          else:
            print("ERROR: No WAV found")
            exit(1)
          PYEOF

      - name: ✅ Verify audio + get duration
        run: |
          if [ ! -f "output_voice.wav" ]; then
            echo "❌ output_voice.wav not found"
            exit 1
          fi
          DURATION=$(ffprobe -v error -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 output_voice.wav)
          echo "✅ Audio: ${DURATION}s"
          echo "$DURATION" > audio_duration.txt

      - name: 🎨 Generate video
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          GIPHY_API_KEY: ${{ secrets.GIPHY_API_KEY }}
          OPT_VERSION: ${{ env.OPT_VERSION }}
          OPT_CUT_INTERVAL: ${{ env.OPT_CUT_INTERVAL }}
          OPT_ZOOM_INTENSITY: ${{ env.OPT_ZOOM_INTENSITY }}
          OPT_PATTERN_INTERRUPT: ${{ env.OPT_PATTERN_INTERRUPT }}
          OPT_TARGET_DURATION: ${{ env.OPT_TARGET_DURATION }}
        run: python generate_video.py

      - name: ✂️ Trim to exact audio length
        run: |
          DURATION=$(cat audio_duration.txt)
          ffmpeg -y -i raw_video.mp4 -t "$DURATION" \
            -c:v libx264 -preset fast -crf 17 \
            -pix_fmt yuv420p -an trimmed.mp4
          mv trimmed.mp4 raw_video.mp4
          echo "✅ Trimmed to ${DURATION}s"

      - name: ✅ Verify output
        run: |
          if [ ! -f "raw_video.mp4" ]; then
            echo "❌ raw_video.mp4 not found"
            exit 1
          fi
          echo "✅ $(wc -c < raw_video.mp4) bytes"
          ffmpeg -i raw_video.mp4 2>&1 | grep -E "Duration|Video" || true

      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ github.sha }}
          path: raw_video.mp4
          retention-days: 30
          if-no-files-found: error

      - name: 📊 Summary
        if: success()
        run: |
          DURATION=$(cat audio_duration.txt 2>/dev/null || echo "N/A")
          echo "## 🎨 Kinetic Typography Video" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | ${DURATION}s |" >> $GITHUB_STEP_SUMMARY
          echo "| Engine | OpenCV + PIL + Librosa + Edge-TTS + GIPHY |" >> $GITHUB_STEP_SUMMARY
          echo "| Assets | 5 GIFs + 4 Stickers (Phrase-Locked) |" >> $GITHUB_STEP_SUMMARY
          echo "| Config | ${{ env.OPT_VERSION }} |" >> $GITHUB_STEP_SUMMARY
            
