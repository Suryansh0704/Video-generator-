name: 🎬 Generate Video

on:
  workflow_dispatch:
    inputs:
      script_text:
        description: 'Script content'
        required: true
        type: string

jobs:
  generate-video:
    name: Run Video Generator
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-liberation

      - name: 📦 Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests

      - name: 📝 Write script.txt
        run: |
          cat << 'SCRIPT_EOF' > script.txt
          ${{ github.event.inputs.script_text }}
          SCRIPT_EOF

      - name: ⬇️ Download latest audio artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install requests
          python - <<'EOF'
          import requests, os, zipfile, shutil

          token = os.environ["GH_TOKEN"]
          headers = {
            "Authorization": f"Bearer {token}",
            "Accept": "application/vnd.github+json"
          }

          # Get latest artifact from Audio-generator- repo
          res = requests.get(
            "https://api.github.com/repos/Suryansh0704/Audio-generator-/actions/artifacts",
            headers=headers
          )
          artifacts = res.json()["artifacts"]
          latest = artifacts[0]
          download_url = latest["archive_download_url"]

          print(f"Downloading artifact: {latest['name']}")
          r = requests.get(download_url, headers=headers)
          with open("audio.zip", "wb") as f:
            f.write(r.content)

          with zipfile.ZipFile("audio.zip", "r") as z:
            z.extractall("audio_extracted")

          # Find the wav file
          import glob
          wavs = glob.glob("audio_extracted/**/*.wav", recursive=True)
          if wavs:
            shutil.copy(wavs[0], "output_voice.wav")
            print(f"Audio ready: output_voice.wav")
          else:
            print("ERROR: No WAV found in artifact")
            exit(1)
          EOF

      - name: 🎬 Generate video
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python generate_video.py

      - name: ✅ Verify output
        run: |
          if [ ! -f "raw_video.mp4" ]; then
            echo "❌ raw_video.mp4 not created"
            exit 1
          fi
          SIZE=$(wc -c < raw_video.mp4)
          echo "✅ raw_video.mp4 ready (${SIZE} bytes)"
          ffmpeg -i raw_video.mp4 2>&1 | grep -E "Duration|Video|Audio" || true

      - name: 📤 Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ github.sha }}
          path: raw_video.mp4
          retention-days: 30
          if-no-files-found: error
      
