name: 🎬 Generate Video

on:
  workflow_dispatch:
    inputs:
      script_text:
        description: 'Script content'
        required: true
        type: string

jobs:
  generate-video:
    name: Run Dark Minimalism Video Generator
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            libsndfile1 \
            libgl1

      - name: 📦 Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install \
            requests \
            opencv-python-headless \
            librosa \
            numpy \
            soundfile

      - name: 📝 Write script.txt
        run: |
          cat << 'SCRIPT_EOF' > script.txt
          ${{ github.event.inputs.script_text }}
          SCRIPT_EOF
          echo "✅ script.txt written ($(wc -c < script.txt) bytes)"
          head -3 script.txt

      - name: ⬇️ Download latest audio artifact
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          python - <<'PYEOF'
          import requests, os, zipfile, shutil, glob

          token = os.environ["GH_TOKEN"]
          headers = {
            "Authorization": f"Bearer {token}",
            "Accept": "application/vnd.github+json"
          }
          res = requests.get(
            "https://api.github.com/repos/Suryansh0704/Audio-generator-/actions/artifacts",
            headers=headers
          )
          artifacts = res.json().get("artifacts", [])
          if not artifacts:
            print("ERROR: No artifacts found")
            exit(1)
          latest = artifacts[0]
          print(f"Downloading: {latest['name']} ({latest['size_in_bytes']} bytes)")
          r = requests.get(latest["archive_download_url"], headers=headers)
          with open("audio.zip", "wb") as f:
            f.write(r.content)
          with zipfile.ZipFile("audio.zip", "r") as z:
            z.extractall("audio_extracted")
          wavs = glob.glob("audio_extracted/**/*.wav", recursive=True)
          if not wavs:
            wavs = glob.glob("audio_extracted/*.wav")
          if wavs:
            shutil.copy(wavs[0], "output_voice.wav")
            print(f"✅ output_voice.wav ready ({os.path.getsize('output_voice.wav')} bytes)")
          else:
            print("ERROR: No WAV found")
            exit(1)
          PYEOF

      - name: ✅ Verify audio + get duration
        run: |
          if [ ! -f "output_voice.wav" ]; then
            echo "❌ output_voice.wav not found"
            exit 1
          fi
          DURATION=$(ffprobe -v error -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 output_voice.wav)
          echo "✅ Audio duration: ${DURATION}s"
          echo "$DURATION" > audio_duration.txt

      - name: 🎨 Generate dark minimalism video
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: python generate_video.py

      - name: ✂️ Trim video to exact audio length
        run: |
          DURATION=$(cat audio_duration.txt)
          echo "Trimming to ${DURATION}s..."
          ffmpeg -y \
            -i raw_video.mp4 \
            -t "$DURATION" \
            -c:v libx264 \
            -preset fast \
            -crf 18 \
            -pix_fmt yuv420p \
            -an \
            trimmed_video.mp4
          mv trimmed_video.mp4 raw_video.mp4
          echo "✅ Trimmed to ${DURATION}s"

      - name: ✅ Verify output
        run: |
          if [ ! -f "raw_video.mp4" ]; then
            echo "❌ raw_video.mp4 not created"
            exit 1
          fi
          echo "✅ raw_video.mp4 ready ($(wc -c < raw_video.mp4) bytes)"
          ffmpeg -i raw_video.mp4 2>&1 | grep -E "Duration|Video" || true

      - name: 📤 Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ github.sha }}
          path: raw_video.mp4
          retention-days: 30
          if-no-files-found: error

      - name: 📊 Write job summary
        if: success()
        run: |
          DURATION=$(cat audio_duration.txt 2>/dev/null || echo "N/A")
          echo "## 🎨 Dark Minimalism Video Generated" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Style | Dark Minimalism — Procedural |" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | ${DURATION}s |" >> $GITHUB_STEP_SUMMARY
          echo "| Engine | OpenCV + Librosa + NumPy |" >> $GITHUB_STEP_SUMMARY
          echo "| Assets | Zero — 100% procedural |" >> $GITHUB_STEP_SUMMARY
          echo "⬇️ Download from **Artifacts** above." >> $GITHUB_STEP_SUMMARY
